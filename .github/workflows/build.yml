name: Build fastroads v2

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

# Added permissions to allow the GITHUB_TOKEN to create releases
permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - osName: windows
            runsOn: windows-latest
            config: normal
          - osName: windows
            runsOn: windows-latest
            config: debug

    runs-on: ${{ matrix.runsOn }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller pywebview

      - name: Build executable on Windows
        if: matrix.osName == 'windows'
        shell: pwsh
        env:
          BUILD_CONFIG: ${{ matrix.config }}
        run: |
          if ($env:BUILD_CONFIG -eq 'debug') {
            .\build.ps1 -Debug
          } else {
            .\build.ps1
          }

      - name: Package build artifact on Windows
        if: matrix.osName == 'windows'
        shell: pwsh
        run: |
          # Ensure dist folder exists
          if (!(Test-Path dist)) { New-Item -ItemType Directory -Path dist }
          $zipFile = "dist/fastroads-${{ matrix.osName }}-${{ matrix.config }}.zip"
          Remove-Item -Force -ErrorAction SilentlyContinue $zipFile
          Compress-Archive -Path dist/fastroads/* -DestinationPath $zipFile

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: fastroads-${{ matrix.osName }}-${{ matrix.config }}
          path: dist/fastroads-${{ matrix.osName }}-${{ matrix.config }}.zip

  release:
    needs: build
    # Only run on pushes to main, tags, or manual dispatch
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Create GitHub release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || format('v{0}', github.run_number) }}"
          name: "${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || format('V{0}', github.run_number) }}"
          body: |
            Automated build release for ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || format('main-build-{0}', github.run_number) }}.
          # Using recursive globbing to find all zips regardless of the artifact folder structure
          files: |
            release-artifacts/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
