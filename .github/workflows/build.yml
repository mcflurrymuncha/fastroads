name: Build fastroads v2

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - osName: windows
            runsOn: windows-latest
            config: normal
          - osName: windows
            runsOn: windows-latest
            config: debug
          - osName: windows
            runsOn: windows-latest
            config: onefile

    runs-on: ${{ matrix.runsOn }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12' # Recommended for stability with PyInstaller

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller pywebview

      - name: Build executable
        shell: pwsh
        run: |
          if ("${{ matrix.config }}" -eq "debug") {
            .\build.ps1 -Debug
          } elseif ("${{ matrix.config }}" -eq "onefile") {
            .\build.ps1 -OneFile
          } else {
            .\build.ps1
          }

      - name: Package build artifact
        shell: pwsh
        run: |
          $artifactPath = "dist/fastroads-${{ matrix.config }}.zip"
          # Logic to handle folder build vs single file build
          if ("${{ matrix.config }}" -eq "onefile") {
             # OneFile usually puts the .exe directly in dist/
             Compress-Archive -Path dist/*.exe -DestinationPath $artifactPath
          } else {
             # Normal/Debug puts files in dist/fastroads/
             Compress-Archive -Path dist/fastroads/* -DestinationPath $artifactPath
          }
          echo "ZIP_PATH=$artifactPath" >> $env:GITHUB_ENV

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: fastroads-${{ matrix.osName }}-${{ matrix.config }}
          path: ${{ env.ZIP_PATH }}

  release:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true # Flattens the folder structure for easier release

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || format('v2.0.{0}', github.run_number) }}
          name: ${{ github.ref_type == 'tag' && github.ref_name || format('Build v2.0.{0}', github.run_number) }}
          body: |
            Automated build for Fast Roads V2.
            Config: Normal, Debug, and One-File included.
          files: release-artifacts/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
