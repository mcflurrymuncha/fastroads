name: Build Fastroads executables

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        config: [normal, debug]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Install build dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller pywebview

      - name: Build executable
        shell: pwsh
        env:
          BUILD_CONFIG: ${{ matrix.config }}
        run: |
          if ($env:BUILD_CONFIG -eq 'debug') {
            .\build.ps1 -Debug
          } else {
            .\build.ps1
          }

      - name: Package build artifact
        shell: pwsh
        run: |
          $zipFile = "dist/fastroads-${{ matrix.config }}.zip"
          Remove-Item -Force -ErrorAction SilentlyContinue $zipFile
          Compress-Archive -Path dist/fastroads/* -DestinationPath $zipFile

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: fastroads-${{ matrix.config }}-build
          path: dist/fastroads-${{ matrix.config }}.zip

  release:
    needs: build
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Download normal build artifact
        uses: actions/download-artifact@v4
        with:
          name: fastroads-normal-build
          path: release-artifacts/normal

      - name: Download debug build artifact
        uses: actions/download-artifact@v4
        with:
          name: fastroads-debug-build
          path: release-artifacts/debug

      - name: Create GitHub release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || 'main-build-' + github.run_number }}
          name: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || 'Main build #' + github.run_number }}
          body: |
            Automated build release for ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || 'main-build-' + github.run_number }}.
          files: |
            release-artifacts/normal/fastroads-normal.zip
            release-artifacts/debug/fastroads-debug.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
